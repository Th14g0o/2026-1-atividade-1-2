version: "3.9"

networks:
  app_net:
    driver: bridge

services:

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: server
    networks:
      - app_net
    ports:
      - "8080:8080"

  cliente_1:
    build:
      context: .
      dockerfile: Dockerfile.cliente
    environment:
      - CLIENT_ID=cliente_1
      - SERVER_HOST=server
    networks:
      - app_net
    depends_on:
      - server

  cliente_2:
    build:
      context: .
      dockerfile: Dockerfile.cliente
    environment:
      - CLIENT_ID=cliente_2
      - SERVER_HOST=server
